<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Swimming Lessons — Live Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:  #15803D;
      --green-bg: #DCFCE7;
      --amber:  #B45309;
      --amber-bg: #FEF3C7;
      --red:    #B91C1C;
      --red-bg: #FEE2E2;
      --grey:   #6B7280;
      --border: #E5E7EB;
      --card-bg: #FFFFFF;
      --page-bg: #F3F4F6;
      --header-bg: #1E293B;
      --header-fg: #F8FAFC;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--page-bg);
      color: #111827;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--header-bg);
      color: var(--header-fg);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 4px rgba(0,0,0,.3);
    }
    header h1 { font-size: 1.05rem; font-weight: 600; letter-spacing: .01em; }
    .header-right { display: flex; align-items: center; gap: 1.25rem; font-size: .82rem; color: #94A3B8; }
    .status-badge {
      display: inline-flex; align-items: center; gap: .4rem;
      padding: .25rem .65rem; border-radius: 9999px; font-size: .78rem; font-weight: 600;
    }
    .status-badge.live   { background: #166534; color: #BBF7D0; }
    .status-badge.waiting{ background: #78350F; color: #FDE68A; }
    .status-badge::before {
      content: '';
      display: block; width: 7px; height: 7px; border-radius: 50%;
      background: currentColor;
    }

    /* ── Layout ── */
    main { max-width: 1280px; margin: 0 auto; padding: 1.75rem 1.5rem 3rem; }

    .section-title {
      font-size: .7rem; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase; color: var(--grey);
      margin: 2rem 0 .75rem;
    }

    /* ── Summary cards ── */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: .875rem;
    }
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: .625rem;
      padding: 1.1rem 1.25rem;
    }
    .card .label { font-size: .75rem; color: var(--grey); font-weight: 500; margin-bottom: .35rem; }
    .card .value { font-size: 1.9rem; font-weight: 700; line-height: 1.1; }
    .card .sub   { font-size: .78rem; color: var(--grey); margin-top: .25rem; }
    .card.green-accent { border-left: 4px solid var(--green); }
    .card.amber-accent { border-left: 4px solid var(--amber); }
    .card.red-accent   { border-left: 4px solid var(--red); }

    /* ── Pool comparison ── */
    .pool-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .875rem;
    }
    @media (max-width: 640px) { .pool-grid { grid-template-columns: 1fr; } }
    .pool-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: .625rem; padding: 1.25rem; }
    .pool-card h3 { font-size: .95rem; font-weight: 700; margin-bottom: 1rem; }
    .pool-stat-row { display: flex; justify-content: space-between; align-items: center; padding: .35rem 0; border-bottom: 1px solid var(--border); font-size: .875rem; }
    .pool-stat-row:last-child { border-bottom: none; }
    .pool-stat-row .stat-val { font-weight: 600; }

    /* ── Utilisation buckets ── */
    .bucket-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: .875rem;
    }
    @media (max-width: 640px) { .bucket-grid { grid-template-columns: 1fr; } }
    .bucket {
      border-radius: .625rem;
      padding: 1.1rem 1.25rem;
      font-size: .875rem;
    }
    .bucket.green { background: var(--green-bg); }
    .bucket.amber { background: var(--amber-bg); }
    .bucket.red   { background: var(--red-bg); }
    .bucket .bkt-label { font-weight: 700; font-size: .8rem; margin-bottom: .5rem; }
    .bucket.green .bkt-label { color: var(--green); }
    .bucket.amber .bkt-label { color: var(--amber); }
    .bucket.red   .bkt-label { color: var(--red); }
    .bucket .bkt-count { font-size: 2rem; font-weight: 700; }
    .bucket .bkt-sub { font-size: .75rem; color: var(--grey); margin-top: .15rem; }

    /* ── Tables ── */
    .table-wrap { background: var(--card-bg); border: 1px solid var(--border); border-radius: .625rem; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; font-size: .85rem; }
    thead th { background: #F9FAFB; padding: .65rem 1rem; text-align: left; font-weight: 600; font-size: .78rem; color: var(--grey); border-bottom: 1px solid var(--border); white-space: nowrap; }
    tbody td { padding: .6rem 1rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: #F9FAFB; }
    .pill {
      display: inline-block; padding: .2rem .55rem; border-radius: 9999px;
      font-size: .72rem; font-weight: 700;
    }
    .pill.green { background: var(--green-bg); color: var(--green); }
    .pill.amber { background: var(--amber-bg); color: var(--amber); }
    .pill.red   { background: var(--red-bg);   color: var(--red); }

    /* ── Fill bar ── */
    .bar-wrap { display: flex; align-items: center; gap: .5rem; }
    .bar-bg { flex: 1; height: 8px; background: var(--border); border-radius: 9999px; overflow: hidden; min-width: 60px; }
    .bar-fill { height: 100%; border-radius: 9999px; }
    .bar-fill.green { background: var(--green); }
    .bar-fill.amber { background: var(--amber); }
    .bar-fill.red   { background: var(--red); }
    .bar-label { font-size: .8rem; font-weight: 600; min-width: 40px; text-align: right; }

    /* ── Teacher cards ── */
    .teacher-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: .875rem;
    }
    .teacher-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: .625rem;
      padding: 1.1rem 1.25rem;
    }
    .teacher-card h4 { font-size: .9rem; font-weight: 700; margin-bottom: .75rem; }
    .t-stat { display: flex; justify-content: space-between; font-size: .8rem; margin-bottom: .3rem; }
    .t-stat .t-val { font-weight: 600; }

    /* ── Empty / waiting ── */
    .waiting-box {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--grey);
    }
    .waiting-box .wi { font-size: 3rem; margin-bottom: 1rem; }
    .waiting-box p  { font-size: 1rem; }

    /* ── Week range chip ── */
    .week-chip { font-size: .78rem; background: #1E3A5F; color: #BAE6FD; padding: .2rem .55rem; border-radius: 9999px; }
  </style>
</head>
<body>

<header>
  <h1>West Lancashire — Swimming Lessons Live Dashboard</h1>
  <div class="header-right">
    <span id="week-range"></span>
    <span id="filename-display"></span>
    <span id="last-updated"></span>
    <span id="status-badge" class="status-badge waiting">Waiting for data</span>
    <a href="/manage" style="color:#94A3B8;font-size:.82rem;text-decoration:none;white-space:nowrap" onmouseover="this.style.color='#F8FAFC'" onmouseout="this.style.color='#94A3B8'">Manage teachers</a>
  </div>
</header>

<div id="setup-banner" style="display:none;background:#78350F;color:#FEF3C7;padding:.6rem 2rem;font-size:.83rem;font-weight:500">
  ⚠ Watch folder not found — <a href="/setup" style="color:#FDE68A;font-weight:700">click here to set it up</a>
</div>

<main id="main-content">
  <div class="waiting-box">
    <div class="wi">🏊</div>
    <p>Waiting for data — drop a CSV export into the watch folder to get started.</p>
  </div>
</main>

<script>
  let lastFilename = null;

  function colorClass(uptake) {
    if (uptake >= 80) return 'green';
    if (uptake >= 50) return 'amber';
    return 'red';
  }

  function pill(uptake) {
    const cls = colorClass(uptake);
    return `<span class="pill ${cls}">${uptake.toFixed(1)}%</span>`;
  }

  function bar(uptake) {
    const cls = colorClass(uptake);
    const w = Math.min(100, uptake).toFixed(1);
    return `
      <div class="bar-wrap">
        <div class="bar-bg"><div class="bar-fill ${cls}" style="width:${w}%"></div></div>
        <span class="bar-label ${cls === 'green' ? 'green' : cls === 'amber' ? 'amber' : 'red'}"
              style="color:var(--${cls})">${uptake.toFixed(1)}%</span>
      </div>`;
  }

  function fmt(n) { return Number(n).toLocaleString(); }

  function renderPoolCard(title, stats) {
    const fillClass = colorClass(stats.avg_fill_rate);
    return `
      <div class="pool-card">
        <h3>${title}</h3>
        <div class="pool-stat-row"><span>Total Classes</span><span class="stat-val">${fmt(stats.total_lessons)}</span></div>
        <div class="pool-stat-row"><span>Booked</span><span class="stat-val">${fmt(stats.total_booked)}</span></div>
        <div class="pool-stat-row"><span>Capacity</span><span class="stat-val">${fmt(stats.total_capacity)}</span></div>
        <div class="pool-stat-row"><span>Avg Fill Rate</span>${bar(stats.avg_fill_rate)}</div>
      </div>`;
  }

  function renderBuckets(lessons) {
    const green = lessons.filter(l => l.uptake >= 80).length;
    const amber = lessons.filter(l => l.uptake >= 50 && l.uptake < 80).length;
    const red   = lessons.filter(l => l.uptake < 50).length;
    return `
      <div class="bucket green">
        <div class="bkt-label">≥ 80% — Good</div>
        <div class="bkt-count">${green}</div>
        <div class="bkt-sub">classes at or above target</div>
      </div>
      <div class="bucket amber">
        <div class="bkt-label">50–79% — Monitor</div>
        <div class="bkt-count">${amber}</div>
        <div class="bkt-sub">classes needing attention</div>
      </div>
      <div class="bucket red">
        <div class="bkt-label">&lt; 50% — Low</div>
        <div class="bkt-count">${red}</div>
        <div class="bkt-sub">under-utilised classes</div>
      </div>`;
  }

  function renderStageTable(stages) {
    if (!stages.length) return '<p style="padding:1rem;color:var(--grey)">No data.</p>';
    const rows = stages.map(s => `
      <tr>
        <td>${s.stage}</td>
        <td>${s.lessons}</td>
        <td>${fmt(s.booked)}</td>
        <td>${fmt(s.capacity)}</td>
        <td>${bar(s.avg_fill_rate)}</td>
      </tr>`).join('');
    return `
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Stage</th><th>Classes</th><th>Booked</th><th>Capacity</th><th>Fill Rate</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }

  function renderUnderUtilised(lessons) {
    if (!lessons.length) return `
      <div class="bucket green" style="border-radius:.625rem;padding:1.1rem 1.25rem">
        <div class="bkt-label">All clear</div>
        <div style="font-size:.875rem;color:var(--green);margin-top:.35rem">No classes below 50% utilisation.</div>
      </div>`;
    const rows = lessons.map(l => `
      <tr>
        <td>${l.class_name}</td>
        <td>${l.pool}</td>
        <td>${l.day}</td>
        <td>${l.time}</td>
        <td>${l.stage}</td>
        <td>${l.teacher}</td>
        <td>${l.bookings} / ${l.class_size}</td>
        <td>${pill(l.uptake)}</td>
      </tr>`).join('');
    return `
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Class</th><th>Pool</th><th>Day</th><th>Time</th><th>Stage</th><th>Teacher</th><th>Booked / Cap</th><th>Fill</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }

  function renderTeacherCards(teachers) {
    return teachers.map(t => `
      <div class="teacher-card">
        <h4>${t.teacher}</h4>
        <div class="t-stat"><span>Classes</span><span class="t-val">${t.lessons}</span></div>
        <div class="t-stat"><span>Booked</span><span class="t-val">${fmt(t.booked)}</span></div>
        <div class="t-stat"><span>Capacity</span><span class="t-val">${fmt(t.capacity)}</span></div>
        <div style="margin-top:.5rem">${bar(t.avg_fill_rate)}</div>
      </div>`).join('');
  }

  function renderAll(data) {
    const s = data.summary;
    const allLessons = [...(data.park_pool || []), ...(data.nye_bevan || [])];

    document.getElementById('main-content').innerHTML = `
      <p class="section-title">Summary</p>
      <div class="summary-grid">
        <div class="card"><div class="label">Total Classes</div><div class="value">${fmt(s.total_lessons)}</div></div>
        <div class="card"><div class="label">Total Booked</div><div class="value">${fmt(s.total_booked)}</div></div>
        <div class="card"><div class="label">Total Capacity</div><div class="value">${fmt(s.total_capacity)}</div></div>
        <div class="card ${colorClass(s.avg_fill_rate)}-accent">
          <div class="label">Avg Fill Rate</div>
          <div class="value" style="color:var(--${colorClass(s.avg_fill_rate)})">${s.avg_fill_rate.toFixed(1)}%</div>
        </div>
      </div>

      <p class="section-title">Pool Comparison</p>
      <div class="pool-grid">
        ${renderPoolCard('Park Pool', data.pool_comparison.park_pool)}
        ${renderPoolCard('Nye Bevan', data.pool_comparison.nye_bevan)}
      </div>

      <p class="section-title">Capacity Utilisation</p>
      <div class="bucket-grid">${renderBuckets(allLessons)}</div>

      <p class="section-title">Stage Breakdown</p>
      ${renderStageTable(data.stage_breakdown)}

      <p class="section-title">Under-Utilised Classes <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:.75rem;color:var(--red)">(below 50%, worst first)</span></p>
      ${renderUnderUtilised(data.under_utilised)}

      <p class="section-title">Teacher Breakdown</p>
      <div class="teacher-grid">${renderTeacherCards(data.teacher_breakdown)}</div>
    `;
  }

  async function fetchAndRender() {
    try {
      const statusRes = await fetch('/api/status');
      const statusData = await statusRes.json();
      document.getElementById('setup-banner').style.display =
        statusData.folder_ok === false ? 'block' : 'none';

      const res = await fetch('/api/data');
      const data = await res.json();

      if (data.status === 'waiting') {
        document.getElementById('status-badge').className = 'status-badge waiting';
        document.getElementById('status-badge').textContent = 'Waiting for data';
        return;
      }

      if (data.filename === lastFilename) return;
      lastFilename = data.filename;

      document.getElementById('status-badge').className = 'status-badge live';
      document.getElementById('status-badge').textContent = 'Live';

      const updated = new Date(data.last_updated);
      document.getElementById('last-updated').textContent =
        'Updated ' + updated.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

      document.getElementById('filename-display').textContent = data.filename || '';

      if (data.week_range) {
        document.getElementById('week-range').innerHTML =
          `<span class="week-chip">${data.week_range.from} – ${data.week_range.to}</span>`;
      }

      renderAll(data);
    } catch (e) {
      console.error('Fetch error:', e);
    }
  }

  fetchAndRender();
  setInterval(fetchAndRender, 60000);
</script>
</body>
</html>
