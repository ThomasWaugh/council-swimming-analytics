<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nye Bevan — Lesson Bookings Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a1a; font-size: 14px; }
  header { background: #1a1a1a; color: #fff; padding: 24px 32px; display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }
  header span { font-size: 13px; opacity: 0.5; }
  .container { max-width: 1100px; margin: 0 auto; padding: 24px; }
  .controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
  .controls select, .controls input { height: 36px; padding: 0 12px; border: 1px solid #ddd; border-radius: 8px; background: #fff; color: #1a1a1a; font-size: 13px; outline: none; }
  .controls select:focus, .controls input:focus { border-color: #999; }
  .controls input { flex: 1; min-width: 180px; }
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 24px; }
  .stat { background: #fff; border-radius: 10px; padding: 14px 16px; border: 1px solid #e8e8e6; }
  .stat-label { font-size: 11px; color: #888; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-val { font-size: 24px; font-weight: 600; color: #1a1a1a; }
  .tblock { background: #fff; border: 1px solid #e8e8e6; border-radius: 12px; margin-bottom: 12px; overflow: hidden; }
  .thead { display: flex; align-items: center; padding: 12px 16px; border-bottom: 1px solid #f0f0ee; background: #fafaf8; }
  .tleft { display: flex; align-items: center; gap: 12px; }
  .av { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 11px; flex-shrink: 0; }
  .tname { font-weight: 600; font-size: 14px; }
  .tmeta { font-size: 12px; color: #888; margin-top: 1px; }
  table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  th { text-align: left; padding: 8px 16px; font-size: 11px; font-weight: 600; color: #888; border-bottom: 1px solid #f0f0ee; white-space: nowrap; text-transform: uppercase; letter-spacing: 0.4px; background: #fafaf8; }
  td { padding: 8px 16px; border-bottom: 1px solid #f5f5f3; color: #1a1a1a; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafaf8; }
  .bar-wrap { display: flex; align-items: center; gap: 8px; }
  .bar-bg { flex: 1; height: 6px; background: #f0f0ee; border-radius: 3px; overflow: hidden; min-width: 60px; }
  .bar-fill { height: 100%; border-radius: 3px; }
  .pct-txt { font-size: 12px; color: #666; min-width: 36px; text-align: right; font-weight: 500; }
  .day-badge { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 5px; font-weight: 600; letter-spacing: 0.3px; }
  .empty { padding: 3rem; text-align: center; color: #aaa; font-size: 13px; }
</style>
</head>
<body>

    <select id="teacherF"><option value="">All teachers</option></select>

  <div class="stats">

    <div class="stat"><div class="stat-label">Total booked</div><div class="stat-val" id="s-b">—</div></div>
    <div class="stat"><div class="stat-label">Total capacity</div><div class="stat-val" id="s-c">—</div></div>

const teachers=[...new Set(data.map(d=>d.teacher))].sort();
const stages=[...new Set(data.map(d=>d.stage))].sort();
const tSel=document.getElementById('teacherF');
teachers.forEach(t=>{const o=document.createElement('option');o.value=t;o.text=t;tSel.appendChild(o);});
const sSel=document.getElementById('stageF');
stages.forEach(s=>{const o=document.createElement('option');o.value=s;o.text=s;sSel.appendChild(o);});

function fillColor(p){if(p>=80)return'#16a34a';if(p>=50)return'#d97706';return'#dc2626';}

function render(){
  const df=document.getElementById('dayF').value;
  const sf=document.getElementById('stageF').value;
  const tf=document.getElementById('teacherF').value;
  const q=document.getElementById('searchF').value.toLowerCase();
  const filtered=data.filter(d=>(!df||d.day===df)&&(!sf||d.stage===sf)&&(!tf||d.teacher===tf)&&(!q||d.class_name.toLowerCase().includes(q)||d.stage.toLowerCase().includes(q)));
  const tb=filtered.reduce((s,d)=>s+d.bookings,0);
  const tc=filtered.reduce((s,d)=>s+d.class_size,0);
  const avgF=filtered.length?Math.round(filtered.reduce((s,d)=>s+d.uptake,0)/filtered.length):0;
  document.getElementById('s-l').textContent=filtered.length;
  document.getElementById('s-b').textContent=tb;
  document.getElementById('s-c').textContent=tc;
  document.getElementById('s-f').textContent=avgF+'%';
  const visT=tf?[tf]:[...new Set(filtered.map(d=>d.teacher))].sort();
  const out=document.getElementById('out');
  if(!filtered.length){out.innerHTML='<p class="empty">No lessons match your filters.</p>';return;}
  out.innerHTML=visT.map(teacher=>{
    const tData=filtered.filter(d=>d.teacher===teacher).sort((a,b)=>dayOrder[a.day]-dayOrder[b.day]||a.time.localeCompare(b.time));
    if(!tData.length)return'';
    const [bg,fg]=avColors[teacher]||["#f3f4f6","#374151"];
    const tBook=tData.reduce((s,d)=>s+d.bookings,0);
    const tCap=tData.reduce((s,d)=>s+d.class_size,0);
    const tAvg=Math.round(tData.reduce((s,d)=>s+d.uptake,0)/tData.length);
    const rows=tData.map(d=>{
      const [dbg,dfg]=dayColors[d.day]||["#f3f4f6","#374151"];
      return`<tr><td><span class="day-badge" style="background:${dbg};color:${dfg}">${d.day}</span></td><td style="color:#666">${d.time}</td><td>${d.class_name}</td><td style="color:#666">${d.stage}</td><td style="font-weight:600;text-align:center">${d.bookings}</td><td style="text-align:center;color:#888">${d.class_size}</td><td><div class="bar-wrap"><div class="bar-bg"><div class="bar-fill" style="width:${d.uptake}%;background:${fillColor(d.uptake)}"></div></div><span class="pct-txt">${Math.round(d.uptake)}%</span></div></td></tr>`;
    }).join('');
    return`<div class="tblock"><div class="thead"><div class="tleft"><div class="av" style="background:${bg};color:${fg}">${teacher.split(' ').map(w=>w[0]).join('')}</div><div><div class="tname">${teacher}</div><div class="tmeta">${tData.length} lessons · ${tBook}/${tCap} booked · avg ${tAvg}% full</div></div></div></div><div style="overflow-x:auto"><table><thead><tr><th>Day</th><th>Time</th><th>Class</th><th>Stage</th><th style="text-align:center">Booked</th><th style="text-align:center">Capacity</th><th>Fill rate</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
  }).join('');
}
['dayF','stageF','teacherF'].forEach(id=>document.getElementById(id).addEventListener('change',render));
